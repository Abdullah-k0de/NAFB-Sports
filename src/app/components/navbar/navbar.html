<header class="navbar" [class.navbar--scrolled]="isScrolled" role="banner">
  <div class="container navbar__inner">

    <!-- ── Brand ── -->
    <a routerLink="/" class="navbar__brand" aria-label="NAFB Sports — Home">
      <img src="assets/NAFB-Sports-logo-without-bg.png" alt="NAFB Sports Logo" class="navbar__logo" />
      <div class="navbar__brand-text">
        <span class="navbar__name">NAFB Sports</span>
        <span class="navbar__sub">National Association of Fitness Based Sports</span>
      </div>
    </a>

    <!-- ── Desktop Navigation ── -->
    <nav class="navbar__links" aria-label="Main navigation">
      <a routerLink="/"            routerLinkActive="navbar__link--active" [routerLinkActiveOptions]="{exact:true}" class="navbar__link">Home</a>
      <a routerLink="/about"       routerLinkActive="navbar__link--active" class="navbar__link">About</a>
      <a routerLink="/sportxercise"routerLinkActive="navbar__link--active" class="navbar__link">Sportxercise</a>
      <a routerLink="/events"      routerLinkActive="navbar__link--active" class="navbar__link">Events</a>
      <a routerLink="/contact"     routerLinkActive="navbar__link--active" class="navbar__link">Contact</a>
    </nav>

    <!-- ── Desktop Actions ── -->
    <div class="navbar__actions">
      <!-- Theme Toggle -->
      <button class="navbar__theme-btn" (click)="themeService.toggleTheme()" [title]="themeService.isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'" aria-label="Toggle theme">
        <!-- Sun icon (shown in dark mode) -->
        <svg *ngIf="themeService.isDark()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon icon (shown in light mode) -->
        <svg *ngIf="!themeService.isDark()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      <a routerLink="/donate" class="btn btn-primary btn-sm navbar__cta desktop-only">
        Donate
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </a>

      <!-- Hamburger (mobile) -->
      <button class="navbar__hamburger" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen" aria-label="Open menu">
        <span class="navbar__bar" [class.navbar__bar--open]="isMenuOpen"></span>
        <span class="navbar__bar" [class.navbar__bar--open]="isMenuOpen"></span>
        <span class="navbar__bar" [class.navbar__bar--open]="isMenuOpen"></span>
      </button>
    </div>
  </div>
</header>

<!-- ── Mobile Drawer ── -->
<div class="mobile-drawer" [class.mobile-drawer--open]="isMenuOpen" role="dialog" aria-modal="true" aria-label="Navigation menu">
  <div class="mobile-drawer__inner">

    <div class="mobile-drawer__head">
      <div class="mobile-drawer__brand">
        <img src="assets/NAFB-Sports-logo-without-bg.png" alt="NAFB Sports" class="mobile-drawer__logo" />
        <span class="mobile-drawer__name">NAFB Sports</span>
      </div>
      <button class="mobile-drawer__close" (click)="toggleMenu()" aria-label="Close menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <nav class="mobile-drawer__nav">
      <a routerLink="/"             routerLinkActive="mobile-link--active" [routerLinkActiveOptions]="{exact:true}" class="mobile-link" (click)="toggleMenu()">Home</a>
      <a routerLink="/about"        routerLinkActive="mobile-link--active" class="mobile-link" (click)="toggleMenu()">About</a>
      <a routerLink="/sportxercise" routerLinkActive="mobile-link--active" class="mobile-link" (click)="toggleMenu()">Sportxercise</a>
      <a routerLink="/events"       routerLinkActive="mobile-link--active" class="mobile-link" (click)="toggleMenu()">Events</a>
      <a routerLink="/contact"      routerLinkActive="mobile-link--active" class="mobile-link" (click)="toggleMenu()">Contact</a>
    </nav>

    <div class="mobile-drawer__foot">
      <div class="mobile-drawer__theme" (click)="themeService.toggleTheme()">
        <span>{{ themeService.isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode' }}</span>
        <div class="theme-pill" [class.theme-pill--dark]="themeService.isDark()">
          <div class="theme-pill__thumb"></div>
        </div>
      </div>
      <a routerLink="/donate" class="btn btn-primary" style="width:100%;justify-content:center;" (click)="toggleMenu()">
        Support NAFB — Donate
      </a>
    </div>

  </div>
</div>

<!-- Overlay -->
<div class="mobile-overlay" [class.mobile-overlay--visible]="isMenuOpen" (click)="toggleMenu()" aria-hidden="true"></div>
