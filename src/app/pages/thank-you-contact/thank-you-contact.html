<main class="scrollable-content main-router-content">
  <!-- Hero Section -->
  <section class="page-hero section parallax-section parallax-section--dark"
    style="background-image: url('assets/contact_hero_bg.png');">
    <div class="container page-hero__inner">
      <div class="page-hero__content reveal">
        <h1 class="page-hero__title display">Message <span class="text-gradient">Sent</span></h1>
        <p class="page-hero__sub">
          We have successfully received your inquiry and our team will be in touch shortly.
        </p>
      </div>
    </div>
  </section>

  <section class="section section--alt thank-you" style="padding-block: 6rem; display: flex; align-items: center;">
    <div class="container container--sm text-center">
      
      <div class="card card-elevated reveal is-visible" style="padding: 4rem 2rem; border-top: 4px solid var(--gold); border-radius: var(--r-xl); background: var(--bg-card); position: relative; overflow: hidden; box-shadow: var(--shadow-xl);">
        
        <!-- Subtle background decoration -->
        <div style="position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%); border-radius: 50%;"></div>

        <div class="thank-you__icon" style="margin-bottom: 2rem; display: inline-flex; align-items: center; justify-content: center; width: 80px; height: 80px; background: rgba(212, 175, 55, 0.1); border-radius: 50%; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        </div>
        
        <h1 class="page-hero__title" style="font-size: clamp(2rem, 4vw, 2.75rem); margin-bottom: 1rem; animation: slideUp 0.6s ease 0.2s both;">Message Received!</h1>
        
        <p class="section-sub" style="margin: 0 auto 2.5rem; max-width: 500px; animation: slideUp 0.6s ease 0.3s both;">
          Thank you for reaching out to NAFB Sports. Our team will review your message and get back to you as soon as possible.
        </p>
        
        <div style="animation: slideUp 0.6s ease 0.4s both;">
          <a routerLink="/" class="btn btn-primary btn-lg" style="min-width: 200px;">Return to Home</a>
        </div>
      </div>
      
    </div>
  </section>
</main>
